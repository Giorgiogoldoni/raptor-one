name: RAPTOR Data Fetch
on:
  schedule:
    - cron: '0 6-18 * * 1-5'
  workflow_dispatch:
jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install yfinance
      - env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
        run: python raptor_fetch.py
      - run: |
          git config user.name "RAPTOR Bot"
          git config user.email "raptor-bot@noreply.github.com"
          git add raptor_data.json
          git diff --staged --quiet || (git commit -m "📊 RAPTOR data $(date +'%d/%m/%Y %H:%M')" && git pull --rebase origin main && git push)
